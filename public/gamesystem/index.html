<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI Team Building — Game System</title>
<style>
:root{
  --bg:#0a0a12; --bg2:#12122099; --panel:#15152a; --panel2:#1d1d3a;
  --ink:#eef0ff; --muted:#9aa0c8; --line:#2a2a4d;
  --p:#7c3aed;      /* purple */
  --a:#22d3ee;      /* cyan */
  --y:#fbbf24;      /* amber */
  --g:#34d399;      /* green */
  --r:#fb7185;      /* red/pink */
  --shadow:0 10px 40px rgba(0,0,0,.5);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 700px at 80% -10%, #241b4d55, transparent),
    radial-gradient(900px 600px at -10% 110%, #0e3a4655, transparent),
    var(--bg);
  color:var(--ink);
  font-family:"Segoe UI",system-ui,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:var(--a)}
button{font-family:inherit;cursor:pointer;border:0;outline:0}
.mono{font-family:"Consolas","Courier New",monospace}

/* Layout */
#app{min-height:100vh;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;
  padding:12px 20px;background:#0a0a12dd;backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--p),var(--a));font-size:22px;box-shadow:var(--shadow)}
.brand b{font-size:16px;letter-spacing:.5px}
.brand small{display:block;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.spacer{flex:1}
.navbtn{
  background:var(--panel);color:var(--ink);border:1px solid var(--line);
  padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;display:inline-flex;gap:7px;align-items:center;
  transition:.15s;
}
.navbtn:hover{border-color:var(--p);background:var(--panel2)}
.navbtn.solid{background:linear-gradient(135deg,var(--p),#a855f7);border-color:transparent}
main{flex:1;max-width:1180px;width:100%;margin:0 auto;padding:26px 20px 80px}

/* Generic */
.h1{font-size:30px;font-weight:800;letter-spacing:.3px;margin:0 0 4px}
.sub{color:var(--muted);font-size:14px;margin:0 0 22px}
.grid{display:grid;gap:16px}
.card{background:linear-gradient(180deg,var(--panel),#101024);border:1px solid var(--line);
  border-radius:var(--radius);box-shadow:var(--shadow)}
.pad{padding:18px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  padding:5px 10px;border-radius:999px;background:#ffffff10;border:1px solid var(--line);color:var(--muted)}
.tag{font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;background:#ffffff0d;border:1px solid var(--line)}
.btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);padding:10px 16px;border-radius:11px;font-weight:700;font-size:14px;transition:.15s}
.btn:hover{border-color:var(--p)}
.btn.primary{background:linear-gradient(135deg,var(--p),#a855f7);border-color:transparent}
.btn.cyan{background:linear-gradient(135deg,#0891b2,var(--a));border-color:transparent;color:#04121a}
.btn.green{background:linear-gradient(135deg,#059669,var(--g));border-color:transparent;color:#04140d}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 11px;font-size:12px;border-radius:9px}
.btn.lg{padding:15px 26px;font-size:17px;border-radius:14px}
.btn:active{transform:translateY(1px)}
input,select,textarea{background:#0c0c1a;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
input:focus,textarea:focus,select:focus{border-color:var(--p)}
.muted{color:var(--muted)}
hr{border:0;border-top:1px solid var(--line);margin:18px 0}

/* Hero banner */
.hero{position:relative;border-radius:22px;overflow:hidden;margin-bottom:24px;border:1px solid var(--line);box-shadow:var(--shadow)}
.hero video,.hero img{display:block;width:100%;max-height:340px;object-fit:cover}
.hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,#0a0a1200 40%,#0a0a12f2);display:flex;flex-direction:column;justify-content:flex-end;padding:22px 26px}
.hero .ht{font-size:clamp(22px,3.4vw,34px);font-weight:900;letter-spacing:.5px;line-height:1.1;text-shadow:0 2px 12px #000}
.hero .hs{color:#c9cdf0;font-size:13.5px;margin-top:5px;text-shadow:0 1px 6px #000}
.hero.slim{margin-bottom:18px}
.hero.slim>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;max-height:none}
.hero.slim .ovs{position:relative;display:flex;flex-direction:column;justify-content:flex-end;min-height:250px;
  background:linear-gradient(180deg,#0a0a1200 42%,#0a0a12f0);padding:16px 22px}
.hero.slim .ghead{margin:0}
.hero.slim h1{text-shadow:0 2px 12px #000}
@media(max-width:560px){.hero.slim .ovs{min-height:195px}}
@media(min-width:1200px){.hero.slim .ovs{min-height:300px}}

/* Home dashboard */
.dashgrid{grid-template-columns:1fr;gap:22px}
@media(min-width:900px){.dashgrid{grid-template-columns:1.55fr 1fr}}
.gamegrid{grid-template-columns:repeat(2,1fr)}
@media(min-width:640px){.gamegrid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1000px){.gamegrid{grid-template-columns:repeat(5,1fr)}}
.gtile{position:relative;background:linear-gradient(180deg,var(--panel2),#12122a);border:1px solid var(--line);
  border-radius:16px;padding:14px;cursor:pointer;transition:.15s;min-height:132px;display:flex;flex-direction:column;gap:8px;overflow:hidden}
.gtile:hover{transform:translateY(-3px);border-color:var(--accent,var(--p));box-shadow:0 14px 30px #0008}
.gtile .act{font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--muted)}
.gtile .emoji{font-size:26px}
.gtile .gn{font-size:13px;font-weight:800;line-height:1.15}
.gtile .ot{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--accent,var(--a));font-weight:700;margin-top:auto}
.gtile .done{position:absolute;top:8px;right:8px;font-size:11px;background:#0009;border:1px solid var(--line);border-radius:8px;padding:2px 6px;color:var(--g);font-weight:700}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;background:#ffffff07;margin-bottom:8px;border:1px solid transparent}
.lb-row:first-child{background:linear-gradient(90deg,#fbbf2422,transparent);border-color:#fbbf2455}
.rank{width:30px;text-align:center;font-weight:900;font-size:18px;color:var(--muted)}
.rank.g{color:var(--y)}
.dot{width:14px;height:14px;border-radius:50%;flex:none;box-shadow:0 0 10px currentColor}
.lb-name{font-weight:700;flex:1}
.lb-score{font-weight:900;font-size:20px;font-variant-numeric:tabular-nums}
.empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px}

/* Game screen header */
.ghead{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:18px}
.ghead .em{font-size:52px;line-height:1;filter:drop-shadow(0 6px 12px #0008)}
.ghead h1{margin:0;font-size:28px;font-weight:800}
.ghead .otag{display:inline-block;margin-top:6px;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:5px 12px;border-radius:999px;color:#04121a}
.cols{display:grid;gap:16px;grid-template-columns:1fr}
@media(min-width:860px){.cols{grid-template-columns:1.35fr 1fr}}
.steps{list-style:none;margin:0;padding:0;counter-reset:s}
.steps li{counter-increment:s;position:relative;padding:9px 0 9px 40px;border-bottom:1px dashed var(--line);font-size:14px;line-height:1.45}
.steps li:last-child{border-bottom:0}
.steps li::before{content:counter(s);position:absolute;left:0;top:8px;width:26px;height:26px;border-radius:8px;
  background:linear-gradient(135deg,var(--p),#a855f7);color:#fff;font-weight:800;font-size:13px;display:grid;place-items:center}
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 0 8px}

/* Timer */
.timer{display:flex;flex-direction:column;align-items:center;gap:12px}
.tdisplay{font-family:"Consolas",monospace;font-weight:800;font-size:64px;letter-spacing:2px;line-height:1;
  font-variant-numeric:tabular-nums;text-shadow:0 0 24px #7c3aed66}
.tdisplay.warn{color:var(--y);text-shadow:0 0 24px #fbbf2466}
.tdisplay.crit{color:var(--r);animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.4}}
.tbar{height:8px;border-radius:999px;background:#ffffff12;overflow:hidden;width:100%}
.tbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--g),var(--a));transition:width .3s linear}
.chips .btn{margin:3px}

/* score entry */
.score-team{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:11px;background:#ffffff07;margin-bottom:8px}
.stepper{display:flex;align-items:center;gap:6px;margin-left:auto}
.stepper button{width:34px;height:34px;border-radius:9px;font-size:18px;font-weight:900;background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
.stepper .val{min-width:52px;text-align:center;font-weight:900;font-size:19px;font-variant-numeric:tabular-nums}
.awardbtns .btn{margin:3px}

/* Randomizers */
.reveal-wrap{display:grid;gap:14px;grid-template-columns:1fr;margin:8px 0 18px}
@media(min-width:720px){.reveal-wrap.three{grid-template-columns:repeat(3,1fr)}
  .reveal-wrap.four{grid-template-columns:repeat(4,1fr)}
  .reveal-wrap.two{grid-template-columns:repeat(2,1fr)}}
.cupgroup{margin:12px 0}
.cglab{font-weight:800;font-size:12px;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.cupgrid{display:flex;flex-wrap:wrap;gap:8px}
.cupbtn{min-width:56px;padding:12px 0;border-radius:12px;border:2px solid var(--cupc);background:#12122a;color:#fff;font-weight:900;font-size:15px;cursor:pointer;transition:.15s;position:relative}
.cupbtn:hover{transform:translateY(-2px);box-shadow:0 0 14px var(--cupc)}
.cupbtn.used{opacity:.5}
.teamchips{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:0 0 14px}
.teamchip{padding:8px 14px;border-radius:999px;border:2px solid var(--tc);background:transparent;color:#fff;font-weight:800;font-size:13px;cursor:pointer;transition:.15s}
.teamchip.active{background:var(--tc);color:#0a0a12;box-shadow:0 0 12px var(--tc)}
.adminrow{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.adminrow b{width:34px;flex:none}
.adminrow input{flex:1;min-width:0}
.playcards{display:grid;gap:12px;grid-template-columns:1fr;margin:10px 0 18px}
@media(min-width:760px){.playcards{grid-template-columns:repeat(3,1fr)}}
.playcard{background:linear-gradient(180deg,var(--panel),#101024);border:1px solid var(--line);border-left:4px solid var(--accent);
  border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
.playcard .pemoji{font-size:34px}
.playcard b{font-size:17px}
.playcard span{color:var(--muted);font-size:12.5px}
.playcard .btn{margin-top:8px}
.arcade{position:fixed;inset:0;z-index:300;background:#04040c;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.arcade canvas{background:#000;border-radius:14px;border:2px solid #2a2a4a;width:min(94vw,calc(78vh*var(--ar,1.6)));height:auto}
.arcade .ahud{display:flex;gap:26px;font-weight:900;font-size:clamp(16px,2.6vh,30px);color:#fff;letter-spacing:1px}
.arcade .akeys{color:var(--muted);font-size:clamp(11px,1.6vh,16px);letter-spacing:.5px}
.arcade .aclose{position:absolute;top:14px;right:16px}
.tctl{position:fixed;bottom:16px;z-index:320;display:none;user-select:none;-webkit-user-select:none;touch-action:none}
.arcade.touch .tctl{display:grid}
.tctl.tleft{left:14px;grid-template-columns:repeat(3,60px);grid-template-rows:repeat(3,60px);gap:4px}
.tctl.tright{right:18px;grid-template-columns:88px}
.tbtn{border-radius:50%;background:#ffffff1f;border:2px solid #ffffff4d;color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent}
.tbtn:active,.tbtn.on{background:#a855f766;border-color:#a855f7}
.tbtn.tjump{width:88px;height:88px;font-weight:900;font-size:26px}
.tctl .tspace{pointer-events:none}
.treeapp{position:fixed;inset:0;z-index:300;background:#07071a;overflow-y:auto;padding:24px 4vw 70px}
.treeapp .thead{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.treeapp h1{margin:0;font-size:clamp(24px,3.4vw,44px);font-weight:900}
.treeapp .tsub{color:var(--muted);font-size:clamp(12px,1.4vw,17px)}
.tgrid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.tcard{border-radius:18px;overflow:hidden;background:linear-gradient(180deg,var(--panel),#101024);border:1px solid var(--line);cursor:pointer;transition:.15s}
.tcard:hover{transform:translateY(-4px);box-shadow:0 0 20px var(--tc)}
.tcard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#141432}
.tcard .tinfo{padding:12px 15px}
.tcard .tinfo b{font-size:clamp(16px,1.8vw,23px)}
.tcard .tinfo span{display:block;color:var(--muted);font-size:clamp(12px,1.3vw,16px)}
.tdetail img{width:100%;max-height:44vh;object-fit:cover;border-radius:18px;background:#141432}
.tstats{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
.tstat{background:#141432;border:1px solid var(--line);border-radius:12px;padding:10px 16px;font-weight:700;font-size:clamp(13px,1.6vw,19px)}
.tfacts{margin:8px 0 0;padding-left:22px}
.tfacts li{font-size:clamp(14px,1.8vw,22px);line-height:1.5;margin-bottom:8px}
.twow{background:linear-gradient(135deg,#7c3aed33,#22d3ee22);border:1px solid #a855f7;border-radius:14px;padding:14px 18px;margin-top:16px;font-size:clamp(15px,1.9vw,23px);font-weight:700}
.qopt{display:block;width:100%;text-align:left;padding:14px 18px;border-radius:14px;border:2px solid var(--line);background:#141432;color:#fff;font-weight:700;font-size:clamp(15px,1.9vw,22px);margin-bottom:10px;cursor:pointer}
.qopt.correct{border-color:#34d399;background:#34d39926}
.qopt.wrong{border-color:#f43f5e;background:#f43f5e26}
.slot{border-radius:16px;border:2px solid var(--line);background:#0c0c1a;padding:20px 14px;text-align:center;min-height:150px;
  display:flex;flex-direction:column;justify-content:center;gap:10px;position:relative;overflow:hidden;transition:.2s}
.slot .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:800;color:var(--muted)}
.slot .val{font-size:22px;font-weight:800;line-height:1.25;min-height:56px;display:flex;align-items:center;justify-content:center}
.slot.spin{animation:jitter .4s infinite}
.slot.locked{border-color:var(--slotc,var(--p));box-shadow:0 0 24px -6px var(--slotc,var(--p))}
@keyframes jitter{25%{transform:translateY(-2px)}75%{transform:translateY(2px)}}
.slot .val.blur{filter:blur(5px);opacity:.7}
.combo{background:linear-gradient(135deg,#1a1a35,#12122a);border:1px solid var(--p);border-radius:16px;padding:18px;margin-top:6px}
.combo .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--a);font-weight:800;margin-bottom:6px}
.combo .txt{font-size:19px;font-weight:700;line-height:1.4}

/* Roulette wheel */
.wheelbox{display:flex;flex-direction:column;align-items:center;gap:12px}
.roulette-row{display:flex;gap:36px;justify-content:center;align-items:flex-start;flex-wrap:wrap;margin:6px 0 4px}
.wheel-outer{position:relative;width:290px;height:290px}
.wheel-ptr{position:absolute;top:-4px;left:50%;transform:translateX(-50%);z-index:3;
  border-left:13px solid transparent;border-right:13px solid transparent;border-top:24px solid var(--y);filter:drop-shadow(0 2px 3px #000)}
.wheel{width:290px;height:290px;border-radius:50%;border:5px solid #2a2a4d;
  transition:transform 4.6s cubic-bezier(.12,.72,.05,1);position:relative;overflow:hidden;box-shadow:0 0 0 4px #0006 inset,var(--shadow)}
.wheel svg{display:block;width:100%;height:100%}
.wheel-hub{position:absolute;top:50%;left:50%;width:46px;height:46px;margin:-23px;border-radius:50%;
  background:#0c0c1a;border:3px solid #2a2a4d;z-index:2;display:grid;place-items:center;font-size:19px;box-shadow:0 0 0 3px #0007}
.wheel-result{font-size:21px;font-weight:800;text-align:center;min-height:27px}

/* Cards */
.pcard{perspective:900px}
.pcard-inner{position:relative;width:100%;min-height:180px;transition:transform .7s;transform-style:preserve-3d}
.pcard.flipped .pcard-inner{transform:rotateY(180deg)}
.pcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;padding:16px;text-align:center;border:2px solid var(--line)}
.pcard-back{background:repeating-linear-gradient(45deg,#1a1338,#1a1338 10px,#221845 10px,#221845 20px);
  font-size:40px;color:#ffffff33}
.pcard-front{background:#0c0c1a;transform:rotateY(180deg);border-color:var(--cc,var(--p));box-shadow:0 0 22px -8px var(--cc,var(--p))}

/* templates */
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.tab{padding:9px 16px;border-radius:11px;background:var(--panel);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--muted)}
.tab.active{background:linear-gradient(135deg,var(--p),#a855f7);color:#fff;border-color:transparent}
pre.code{background:#07070f;border:1px solid var(--line);border-radius:12px;padding:14px;overflow:auto;font-size:12.5px;line-height:1.5;max-height:340px;white-space:pre-wrap;word-break:break-word}
.copywrap{position:relative}
.copybtn{position:absolute;top:10px;right:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
  background:var(--g);color:#04140d;font-weight:800;padding:11px 20px;border-radius:12px;z-index:200;transition:.25s;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 📱 mobile optimiser — participant mission view (QR scan target) */
.mission .steps li{font-size:15.5px}
@media(max-width:560px){
  main{padding:16px 14px 60px}
  .mission .ghead .em{font-size:44px}
  .mission h1{font-size:24px!important}
  .mission .steps li{font-size:16.5px;line-height:1.5;padding:13px 0 13px 44px}
  .mission .steps li::before{width:30px;height:30px;font-size:15px;top:11px}
  .mission .tag{font-size:13px;padding:7px 13px}
  .mission p{font-size:16px!important}
}

/* 🖥️ projector optimiser — big screen / landscape tablet */
@media(min-width:1200px){
  .ghead h1{font-size:34px}
  .ghead .em{font-size:62px}
  .steps li{font-size:17px;padding:12px 0 12px 48px}
  .steps li::before{width:31px;height:31px;font-size:15px;top:10px}
  .tdisplay{font-size:92px}
  .card .pad,.pad{padding:22px}
  .section-label{font-size:12px}
  .combo .txt{font-size:23px}
  .wheel-result{font-size:24px}
  .slot .val{font-size:26px}
}

/* flag retrieval board */
.flag-grid{display:grid;gap:16px;grid-template-columns:repeat(2,1fr)}
@media(min-width:640px){.flag-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1000px){.flag-grid{grid-template-columns:repeat(5,1fr)}}
.flagcard{perspective:900px;cursor:pointer}
.flagcard-inner{position:relative;width:100%;aspect-ratio:3/4;transition:transform .65s;transform-style:preserve-3d}
.flagcard:hover .flagcard-inner{transform:translateY(-4px)}
.flagcard.revealed .flagcard-inner,.flagcard.revealed:hover .flagcard-inner{transform:rotateY(180deg)}
.flagface{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:9px;padding:14px;text-align:center;border:2px solid #ffffff22;box-shadow:var(--shadow)}
.flagface.front{background:linear-gradient(160deg,#ffffff2e,#00000052),var(--fc)}
.flagface.front .q{font-size:54px;font-weight:900;color:#ffffffe6;text-shadow:0 4px 14px #0007}
.flagface.front .cn{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;font-weight:800;color:#ffffffd0}
.flagface.back{background:#12122a;transform:rotateY(180deg);border-color:var(--fc)}
.flagface.back .em{font-size:36px}
.flagface.back .nm{font-weight:800;font-size:14px;line-height:1.25}
.flagface.back .qrhint{font-size:11px;color:var(--muted)}
.modal-ov{position:fixed;inset:0;background:#000b;backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:linear-gradient(180deg,var(--panel2),#101024);border:1px solid var(--line);border-radius:22px;
  max-width:760px;width:100%;padding:28px;display:flex;gap:28px;flex-wrap:wrap;justify-content:center;box-shadow:var(--shadow)}
.qrbox{background:#fff;border-radius:16px;padding:12px;width:258px;height:258px;display:grid;place-items:center}
.qrbox svg{display:block;width:100%;height:100%}

/* misc */
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line);font-size:14px}
.kv:last-child{border:0}
.team-edit{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.swatch{width:26px;height:26px;border-radius:8px;flex:none;cursor:pointer;border:2px solid #fff2}
.iconbtn{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:9px;width:36px;height:36px;font-size:16px}
.iconbtn:hover{color:var(--r);border-color:var(--r)}
.big-note{background:#fbbf2412;border:1px solid #fbbf2455;color:#fde68a;border-radius:12px;padding:12px 14px;font-size:13px}
.role-grid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:640px){.role-grid{grid-template-columns:1fr 1fr}}
.role{background:#ffffff07;border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.role b{display:block;font-size:14px}.role span{font-size:12px;color:var(--muted)}
.fs-hint{font-size:12px;color:var(--muted)}
</style>

function ensureCups(){
  if(!state.cups) state.cups = {
    C: POOL.cupCharacter.slice(0,10),
    A: POOL.cupAction.slice(0,10),
    S: POOL.cupScene.slice(0,10),
    used:{}, current:{C:null,A:null,S:null}
  };
  if(!state.scan3) state.scan3={};
  if(!state.g7) state.g7={};
  if(!state.g8) state.g8={};
}

function load(){
  try{
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    if(s && s.teams) return s;
  }catch(e){}
  return { teams:[
    {id:uid(),name:"Team 1",color:TEAM_COLORS[0],scores:{}},
    {id:uid(),name:"Team 2",color:TEAM_COLORS[1],scores:{}},
  ]};
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function teamTotal(t){ return Object.values(t.scores||{}).reduce((a,b)=>a+(+b||0),0); }
function rankedTeams(){ return [...state.teams].sort((a,b)=>teamTotal(b)-teamTotal(a)); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ---------- Timer ---------- */
let TIMERS=[];
function clearTimers(){ TIMERS.forEach(clearInterval); TIMERS=[]; }
function mountTimer(el, total){
  if(!el) return;
  let remaining = total, running=false, iv=null;
  el.innerHTML = `<div class="timer">
    <div class="tdisplay" id="td">${fmt(remaining)}</div>
    <div class="tbar"><i id="tbar" style="width:100%"></i></div>
    <div class="row chips" style="justify-content:center;margin-top:6px">
      <button class="btn primary" id="tStart">▶ Start</button>
      <button class="btn" id="tReset">↺ Reset</button>
    </div>
    <div class="row chips" style="justify-content:center">
      <button class="btn sm ghost" data-add="60">+1:00</button>
      <button class="btn sm ghost" data-add="30">+0:30</button>
      <button class="btn sm ghost" data-add="-30">−0:30</button>
    </div>
  </div>`;
  const td=el.querySelector("#td"), bar=el.querySelector("#tbar"), startBtn=el.querySelector("#tStart");
  function paint(){
    td.textContent=fmt(remaining);
    bar.style.width=Math.max(0,remaining/total*100)+"%";
    td.className="tdisplay"+(remaining<=10?" crit":remaining<=30?" warn":"");
  }
  function tick(){
    remaining--;
    if(remaining<=0){ remaining=0; stop(); beep(); toast("⏰ Time's up!"); }
    paint();
  }
  function start(){ if(running)return; running=true; startBtn.textContent="⏸ Pause"; startBtn.classList.remove("primary"); iv=setInterval(tick,1000); TIMERS.push(iv); }
  function stop(){ running=false; clearInterval(iv); startBtn.textContent="▶ Start"; startBtn.classList.add("primary"); }
  startBtn.onclick=()=>running?stop():start();
  el.querySelector("#tReset").onclick=()=>{ stop(); remaining=total; paint(); };
  el.querySelectorAll("[data-add]").forEach(b=>b.onclick=()=>{ remaining=Math.max(0,remaining+ +b.dataset.add); if(remaining>total){/*allow grow*/} paint(); });
  paint();
}
function fmt(s){ const m=Math.floor(s/60), ss=s%60; return m+":"+String(ss).padStart(2,"0"); }

/* Web Audio beep — no external file */
function beep(){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    [0,180,360].forEach((delay,i)=>{
      const o=ctx.createOscillator(), gN=ctx.createGain();
      o.type="square"; o.frequency.value=i===2?1180:880;
      o.connect(gN); gN.connect(ctx.destination);
      const t=ctx.currentTime+delay/1000;
      gN.gain.setValueAtTime(.001,t); gN.gain.exponentialRampToValueAtTime(.25,t+.02);
      gN.gain.exponentialRampToValueAtTime(.001,t+.16);
      o.start(t); o.stop(t+.18);
    });
  }catch(e){}
}

function mountScore(el, g){

  if(!state.teams.length){ el.innerHTML=`<div class="empty">Add teams first.<br><button class="btn sm primary" style="margin-top:8px" onclick="go('#/teams')">Set up teams</button></div>`; return; }

      return `<div class="score-team">

        <b>${esc(t.name)}</b>
        <div class="stepper">
          <button onclick="bump('${t.id}',${g.id},-1)">−</button>
          <span class="val" style="color:${t.scores[g.id]!=null?'var(--ink)':'var(--muted)'}">${v}</span>
          <button onclick="bump('${t.id}',${g.id},1)">＋</button>
        </div>
      </div>`;
    }).join("") + `
      <hr/>
      <p class="fs-hint" style="margin:0 0 8px">Quick award — tap a placing to add:</p>

}
function bump(teamId, gameId, d){
  const t=state.teams.find(x=>x.id===teamId); if(!t)return;
  const cur = t.scores[gameId]!=null ? t.scores[gameId] : 0;
  t.scores[gameId]=Math.max(0,cur+d); save();
  const m=document.getElementById("scoreMount"); if(m&&m._draw)m._draw();
  refreshMini();
}
function clearGame(gameId){ state.teams.forEach(t=>{ delete t.scores[gameId]; }); save();
  const m=document.getElementById("scoreMount"); if(m&&m._draw)m._draw(); refreshMini(); toast("Cleared"); }
function awardTop(gameId){
  const pts=[10,7,5,3,2,1,1,1,1,1,1,1];
  const names=state.teams.map(t=>t.name);
  const order=prompt("Enter team finishing order, best first — comma separated.\nTeams: "+names.join(", "),names.join(", "));
  if(!order)return;
  const wanted=order.split(",").map(s=>s.trim().toLowerCase());
  let rank=0;
  wanted.forEach(nm=>{
    const t=state.teams.find(x=>x.name.toLowerCase()===nm);
    if(t){ t.scores[gameId]=pts[rank]||1; rank++; }
  });
  save(); const m=document.getElementById("scoreMount"); if(m&&m._draw)m._draw(); refreshMini(); toast("Points awarded");
}
function refreshMini(){ /* no mini on game page; leaderboard refreshes on nav */ }

/* ---------- Randomizer helpers ---------- */
function spinSlot(slotEl, pool, finalVal, dur, cb){
  const valEl=slotEl.querySelector(".val");
  slotEl.classList.add("spin"); valEl.classList.add("blur");
  const iv=setInterval(()=>{ valEl.textContent=pick(pool); }, 70); TIMERS.push(iv);
  setTimeout(()=>{
    clearInterval(iv);
    slotEl.classList.remove("spin"); valEl.classList.remove("blur");
    valEl.textContent=finalVal; slotEl.classList.add("locked");
    cb&&cb();
  }, dur);
}

      ${state.teams.map(t=>`<button class="teamchip" style="--tc:${t.color}" data-team="${t.id}">${esc(t.name)}</button>`).join("")}
    </div>
    <div class="reveal-wrap three">
      ${CUPCATS.map(([k,em,lab,col])=>`<div class="slot" style="--slotc:${col}" data-k="${k}">
        <div class="lab" style="color:${col}">${em} ${lab} <span id="cupNum${k}"></span></div>
        <div class="val muted">— cup —</div></div>`).join("")}
    </div>
    ${CUPCATS.map(([k,em,lab,col])=>`
      <div class="cupgroup"><div class="cglab" style="color:${col}">${em} ${lab} cups</div>
      <div class="cupgrid">${state.cups[k].map((_,i)=>
        `<button class="cupbtn" style="--cupc:${col}" data-cat="${k}" data-i="${i}">${k}${i+1}</button>`).join("")}
      </div></div>`).join("")}
    <div class="row" style="justify-content:center;margin-top:12px">
      <button class="btn ghost sm" id="cupNext">🧹 Next team</button>
      <button class="btn ghost sm" onclick="go('#/admin')">🔒 Edit contents (admin)</button>
    </div>
    <div class="combo" id="cupCombo" style="display:none;margin-top:16px">
      <div class="lab" id="cupComboLab">Team prompt</div><div class="txt" id="cupTxt"></div>
      <div class="row" style="margin-top:10px"><button class="btn ghost sm" id="cupCopy">📋 Copy prompt</button></div>
    </div>`;
  let spinning=false;
  const teamOf=id=>state.teams.find(t=>t.id===id)||null;
  const paint=()=>{
    m.querySelectorAll(".teamchip").forEach(ch=>ch.classList.toggle("active", ch.dataset.team===state.cups.activeTeam));
    CUPCATS.forEach(([k])=>{
      const slot=m.querySelector(`.slot[data-k="${k}"]`), val=slot.querySelector(".val");
      const cur=state.cups.current[k];
      if(cur==null){ val.textContent="— cup —"; val.classList.add("muted"); slot.classList.remove("locked"); m.querySelector("#cupNum"+k).textContent=""; }
      else{ val.textContent=state.cups[k][cur]; val.classList.remove("muted"); slot.classList.add("locked"); m.querySelector("#cupNum"+k).textContent="· "+k+(cur+1); }
    });
    m.querySelectorAll(".cupbtn").forEach(b=>{
      const id=b.dataset.cat+(+b.dataset.i+1), by=state.cups.used[id], t=by?teamOf(by):null;
      b.classList.toggle("used", !!by);
      if(t){ b.style.borderColor=t.color; b.style.background=t.color+"2e"; b.style.color=t.color; b.title="Shot by "+t.name; }
      else if(by){ b.style.borderColor="#666"; b.style.background=""; b.style.color=""; b.title="Revealed"; }
      else { b.style.borderColor=""; b.style.background=""; b.style.color=""; b.title=""; }
    });
    const c=state.cups.current, all=c.C!=null&&c.A!=null&&c.S!=null;
    const combo=m.querySelector("#cupCombo");
    if(all){
      const txt=`${state.cups.C[c.C]} ${state.cups.A[c.A]} ${state.cups.S[c.S]}`;
      const at=teamOf(state.cups.activeTeam);
      const lab=m.querySelector("#cupComboLab");
      lab.textContent = at ? `${at.name} — prompt` : "Team prompt";
      lab.style.color = at ? at.color : "";
      m.querySelector("#cupTxt").textContent=txt;
      combo.style.display="block";
      m.querySelector("#cupCopy").onclick=()=>copy(txt);
    } else combo.style.display="none";
  };
  m.querySelectorAll(".teamchip").forEach(ch=>ch.onclick=()=>{
    state.cups.activeTeam=ch.dataset.team; save(); paint();
  });
  m.querySelectorAll(".cupbtn").forEach(b=>b.onclick=()=>{
    if(spinning) return;
    const k=b.dataset.cat, i=+b.dataset.i;
    spinning=true;
    const slot=m.querySelector(`.slot[data-k="${k}"]`);
    slot.classList.remove("locked");
    m.querySelector("#cupCombo").style.display="none";
    spinSlot(slot, state.cups[k], state.cups[k][i], 1300, ()=>{
      spinning=false;
      state.cups.current[k]=i;
      state.cups.used[k+(i+1)]=state.cups.activeTeam||true;
      save(); paint();
    });
  });
  m.querySelector("#cupNext").onclick=()=>{
    state.cups.current={C:null,A:null,S:null};
    const idx=state.teams.findIndex(t=>t.id===state.cups.activeTeam);
    if(state.teams.length) state.cups.activeTeam=state.teams[(idx+1)%state.teams.length].id;
    save(); paint();
  };
  paint();
}

/* ---------- Admin (password-gated) ---------- */
const ADMIN_PASS="1994";
function adminOk(){ return sessionStorage.getItem("aitb_admin")==="1"; }
function adminTry(){
  const v=document.getElementById("adminPw").value;
  if(v===ADMIN_PASS){ sessionStorage.setItem("aitb_admin","1"); render(); }
  else toast("Wrong password");
}
function adminLock(){ sessionStorage.removeItem("aitb_admin"); go("#/"); }
function adminEdit(k,i,v){ state.cups[k][i]=v; save(); }
function adminShuffle(){
  ["C","A","S"].forEach(k=>state.cups[k].sort(()=>Math.random()-.5));
  state.cups.used={}; state.cups.current={C:null,A:null,S:null};
  save(); render(); toast("Shuffled — rewrite your paper slips!");
}

function adminGDone(gid,tid){
  state.gdone=state.gdone||{};

  save(); render();
}
function adminGDoneReset(gid){
  if(state.gdone) delete state.gdone[gid];
  save(); render(); toast("Game "+gid+" progress reset");
}
function adminG7Type(id,i,v){
  state.g7=state.g7||{};
  const s=state.g7[id]=state.g7[id]||{};
  if(!Array.isArray(s.words))s.words=[];
  s.words[i]=v; save();
}
function adminG7Submit(id){
  const vals=[0,1,2,3,4,5,6].map(i=>{
    const inp=document.getElementById("g7w_"+id+"_"+i);
    return inp?inp.value.trim():"";
  });
  if(!vals.some(v=>v)){ toast("Type at least one word first"); return; }
  state.g7=state.g7||{};
  const s=state.g7[id]=state.g7[id]||{};
  s.words=vals; s.submitted=true;
  save(); render();
}
function adminG7Edit(id){
  const s=(state.g7||{})[id]; if(!s)return;
  s.submitted=false; save(); render();
}
function adminG7Done(id){ state.g7=state.g7||{}; const s=state.g7[id]=state.g7[id]||{}; if(!s.submitted)return; s.done=!s.done; save(); render(); }
function adminG7Reset(){ state.g7={}; save(); render(); toast("Game 7 progress reset"); }
function adminG8Sync(id){
  // bank points to the scoreboard when a turn is ended or all pictures are done
  const s=(state.g8||{})[id]; const team=state.teams.find(x=>x.id===id);
  if(!team) return;
  const n=s?Object.values(s.done||{}).filter(Boolean).length:0;
  if(s&&(s.ended||n===SHOWDOWN.length)) team.scores[8]=n;
  else delete team.scores[8];
}
function adminG8Toggle(id,num){
  state.g8=state.g8||{};
  const s=state.g8[id]=state.g8[id]||{done:{}};
  if(s.ended) return;
  s.done[num]=!s.done[num];
  adminG8Sync(id); save(); render();
}
function adminG8End(id){
  state.g8=state.g8||{};
  const s=state.g8[id]=state.g8[id]||{done:{}};
  s.ended=true; adminG8Sync(id); save(); render();
  const t=state.teams.find(x=>x.id===id);
  const n=Object.values(s.done||{}).filter(Boolean).length;
  toast((t?t.name:"Team")+" banked "+n+" pts 🏁");
}
function adminG8Reopen(id){
  const s=(state.g8||{})[id]; if(!s)return;
  s.ended=false; adminG8Sync(id); save(); render();
}
function adminG8Reset(){
  state.g8={};
  state.teams.forEach(t=>{ if(t.scores) delete t.scores[8]; });
  save(); render(); toast("Game 8 progress reset");
}
function adminScan3(id){ state.scan3=state.scan3||{}; (state.scan3[id]=state.scan3[id]||{}).scan=Date.now(); save(); render(); }
function adminDone3(id){ state.scan3=state.scan3||{}; const s=state.scan3[id]=state.scan3[id]||{}; if(!s.scan)s.scan=Date.now(); s.done=Date.now(); save(); render(); }
function adminUndo3(id){ const s=(state.scan3||{})[id]; if(!s)return; if(s.done)delete s.done; else delete s.scan; save(); render(); }
function adminReset3(){ state.scan3={}; save(); render(); toast("Game 3 progress reset"); }

/* ---- Game 05: Roulette (two wheels) ---- */
function mountRoulette(){
  const m=document.getElementById("moduleMount"); if(!m)return;
  m.innerHTML=`
    <p class="section-label">🎡 Double Roulette <span class="muted" style="text-transform:none;letter-spacing:0">— spin each wheel one at a time</span></p>
    <div class="roulette-row">
      ${wheelHtml("genre","Genre","🎸","#f472b6")}
      ${wheelHtml("topic","Mandatory Topic","🎤","#22d3ee")}
    </div>
    <div class="combo" id="rCombo" style="display:none;margin-top:16px">
      <div class="lab">Your song brief</div>
      <div class="txt"><span id="rGenre">—</span> song about <span id="rTopic">—</span></div>
    </div>`;
  const spin={
    genre:setupWheel(m.querySelector('[data-w="genre"]'),POOL.genre),
    topic:setupWheel(m.querySelector('[data-w="topic"]'),POOL.topic),
  };
  const res={};
  const meta={genre:{label:"Genre",out:"#rGenre"},topic:{label:"Topic",out:"#rTopic"}};
  m.querySelectorAll('[data-spin]').forEach(btn=>{
    btn.onclick=()=>{
      const key=btn.dataset.spin, val=pick(POOL[key]);
      btn.disabled=true; btn.style.opacity=".55"; btn.textContent="Spinning…";
      m.querySelector(meta[key].out).textContent="…";
      spin[key](val,()=>{
        res[key]=val;
        m.querySelector(meta[key].out).textContent=val;
        btn.disabled=false; btn.style.opacity="1"; btn.textContent="🔁 Re-spin "+meta[key].label;
        if(res.genre&&res.topic) m.querySelector("#rCombo").style.display="block";
      });
    };
  });
}
function wheelHtml(key,label,icon,col){
  return `<div class="wheelbox">
    <div class="lab" style="color:${col};font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:800">${label}</div>
    <div class="wheel-outer">

  </div>`;

function setupWheel(wheelEl, pool){
  const n=pool.length, seg=360/n, C=100, R=96, hubR=19;
  const colors=["#7c3aed","#22d3ee","#fbbf24","#34d399","#fb7185","#f472b6","#60a5fa","#f59e0b","#10b981","#e879f9"];
  const col=i=>colors[i%colors.length];
  let paths="", labels="";
  for(let i=0;i<n;i++){
    const a0=(i*seg-90)*Math.PI/180, a1=((i+1)*seg-90)*Math.PI/180;
    const x0=(C+R*Math.cos(a0)).toFixed(2), y0=(C+R*Math.sin(a0)).toFixed(2);
    const x1=(C+R*Math.cos(a1)).toFixed(2), y1=(C+R*Math.sin(a1)).toFixed(2);
    const large=seg>180?1:0;
    paths+=`<path d="M${C} ${C} L${x0} ${y0} A${R} ${R} 0 ${large} 1 ${x1} ${y1} Z" fill="${col(i)}" stroke="#0b0b16" stroke-width="0.7"/>`;
    // label: centred on the wedge's radial centreline; flip lower half so text stays upright
    const mid=i*seg+seg/2, flip=(mid>90&&mid<270), rMid=(hubR+R)/2, midRad=mid*Math.PI/180;
    const px=(C+rMid*Math.sin(midRad)).toFixed(2), py=(C-rMid*Math.cos(midRad)).toFixed(2);
    const rot=(flip?mid+90:mid-90).toFixed(2);
    labels+=`<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="central"
      transform="rotate(${rot} ${px} ${py})"
      font-size="7.6" font-weight="800" fill="#fff"
      style="paint-order:stroke;stroke:#000;stroke-width:1.7;stroke-linejoin:round">${esc(pool[i])}</text>`;
  }
  wheelEl.innerHTML=`<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><g>${paths}</g>`+
    `<circle cx="${C}" cy="${C}" r="${hubR}" fill="#0c0c1a" stroke="#2a2a4d" stroke-width="2"/><g>${labels}</g></svg>`;
  const resEl=wheelEl.closest(".wheel-outer").parentElement.querySelector("[data-r]");
  let currentRot=0;
  return function(finalVal, cb){
    resEl.textContent="…";
    const idx=pool.indexOf(finalVal);
    const target = 360*5 + (360 - (idx*seg + seg/2)); // land pointer(top) on segment centre
    currentRot += target;
    wheelEl.style.transform=`rotate(${currentRot}deg)`;
    setTimeout(()=>{ resEl.textContent=finalVal; cb&&cb(); }, 4600);
  };
}

function arcadeKeys(){
  const k={};
  const MAP={arrowleft:"left",a:"left",arrowright:"right",d:"right",arrowup:"up",w:"up",arrowdown:"down",s:"down"," ":"jump",enter:"enter"};
  const dn=e=>{ const key=MAP[e.key.toLowerCase()]; if(key){ k[key]=true; e.preventDefault(); } };
  const up=e=>{ const key=MAP[e.key.toLowerCase()]; if(key){ k[key]=false; e.preventDefault(); } };
  window.addEventListener("keydown",dn); window.addEventListener("keyup",up);
  k._off=()=>{ window.removeEventListener("keydown",dn); window.removeEventListener("keyup",up); if(ARCADE_KEYS===k)ARCADE_KEYS=null; };
  ARCADE_KEYS=k;
  return k;
}
function arcadeLoop(step,draw,k){
  // fixed 60Hz logic step regardless of display refresh rate
  let raf, last=performance.now(), acc=0;
  const loop=now=>{
    acc+=Math.min(200,now-last); last=now;
    while(acc>=16.67){ step(); acc-=16.67; }
    draw(); raf=requestAnimationFrame(loop);
  };
  raf=requestAnimationFrame(loop);
  return {stop(){ cancelAnimationFrame(raf); k._off(); }};
}
function arcadeText(ctx,W,H,big,small){
  ctx.fillStyle="#000a"; ctx.fillRect(0,H/2-90,W,180);
  ctx.textAlign="center"; ctx.fillStyle="#fff";
  ctx.font="900 52px Segoe UI,system-ui,sans-serif"; ctx.fillText(big,W/2,H/2-10);
  ctx.font="700 22px Segoe UI,system-ui,sans-serif"; ctx.fillStyle="#fbbf24"; ctx.fillText(small,W/2,H/2+40);
}

/* --- Super Jumpman: side-scrolling platformer --- */
function gameJump(cv,hud,keysEl){
  const W=960,H=520,T=40; cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  keysEl.textContent="← → / A D move · Space jump · Enter restart · Esc close";
  const ROWS=[
    "",
    "",
    "              ooo            ooo",
    "             =====          =====",
    "",
    "                                     ooo          ooo               ooo",
    "       =o=                          =====        =====     ===    =====",
    "",
    "        o             oo                     o                             o",
    "      =====          ====        ==o==      ===        ====      ==      ===",
    "  P        E        E         E          E          E         E        E",
    "#############   #################   ##########################   ###############",
    "#############   #################   ##########################   ###############",
  ].map(r=>r.padEnd(84," "));
  const COLS=84, WORLD=COLS*T;
  const solid=(c,r)=>{ if(c<0||c>=COLS)return true; if(r<0)return false; if(r>=ROWS.length)return false; const ch=ROWS[r][c]; return ch==="#"||ch==="="; };
  let p,coins,enemies,flag,cam,score,lives,st,tick;
  function init(){
    coins=[]; enemies=[]; flag=null;
    for(let r=0;r<ROWS.length;r++)for(let c=0;c<COLS;c++){
      const ch=ROWS[r][c];
      if(ch==="o")coins.push({x:c*T+T/2,y:r*T+T/2,got:false});
      if(ch==="E")enemies.push({x:c*T+T/2,y:r*T+T-16,dir:-1,dead:false});
      if(ch==="F")flag={x:c*T+T/2,y:r*T};
      if(ch==="P")p={x:c*T+8,y:r*T,vx:0,vy:0,w:26,h:36,ground:false,face:1};
    }
    if(!flag)flag={x:(COLS-4)*T,y:9*T};
    cam=0; score=0; lives=3; st="play"; tick=0;
  }
  function respawn(){ p.x=T+8; p.y=10*T-40; p.vx=0; p.vy=0; cam=0; }
  const k=arcadeKeys();
  function hurt(){ lives--; if(lives<=0){st="over";} else respawn(); }
  function step(){
    tick++;
    if(st!=="play"){ if(k.enter||k.jump)init(); return; }
    // input
    if(k.left){p.vx-=.6;p.face=-1} if(k.right){p.vx+=.6;p.face=1}
    p.vx*=.85; p.vx=Math.max(-5,Math.min(5,p.vx));
    if(k.jump&&p.ground){p.vy=-13;p.ground=false;}
    p.vy+=.6; p.vy=Math.min(14,p.vy);
    // X move + collide
    p.x+=p.vx;
    let c0=Math.floor(p.x/T),c1=Math.floor((p.x+p.w)/T),r0=Math.floor(p.y/T),r1=Math.floor((p.y+p.h-1)/T);
    for(let r=r0;r<=r1;r++){ if(p.vx>0&&solid(c1,r)){p.x=c1*T-p.w-0.01;p.vx=0;} if(p.vx<0&&solid(c0,r)){p.x=(c0+1)*T+0.01;p.vx=0;} }
    // Y move + collide
    p.y+=p.vy; p.ground=false;
    c0=Math.floor(p.x/T);c1=Math.floor((p.x+p.w)/T);r0=Math.floor(p.y/T);r1=Math.floor((p.y+p.h)/T);
    for(let c=c0;c<=c1;c++){
      if(p.vy>0&&solid(c,r1)){p.y=r1*T-p.h-0.01;p.vy=0;p.ground=true;}
      if(p.vy<0&&solid(c,r0)){p.y=(r0+1)*T+0.01;p.vy=0;}
    }
    if(p.y>H+80)hurt();
    // coins
    coins.forEach(o=>{ if(!o.got&&Math.abs(p.x+p.w/2-o.x)<26&&Math.abs(p.y+p.h/2-o.y)<28){o.got=true;score+=50;} });
    // enemies
    enemies.forEach(e=>{
      if(e.dead)return;
      e.x+=e.dir*1.3;
      const ec=Math.floor((e.x+e.dir*14)/T), er=Math.floor((e.y+14)/T);
      if(solid(ec,Math.floor(e.y/T))||!solid(ec,er)) e.dir*=-1;
      const dx=(p.x+p.w/2)-e.x, dy=(p.y+p.h/2)-(e.y-2);
      if(Math.abs(dx)<24&&Math.abs(dy)<26){
        if(p.vy>2&&dy<-4){e.dead=true;score+=100;p.vy=-8;}
        else hurt();
      }
    });
    // flag
    if(Math.abs(p.x+p.w/2-flag.x)<24&&p.y+p.h>flag.y-10){st="win";score+=500;}
    cam=Math.max(0,Math.min(WORLD-W,p.x-360));
  }
  function draw(){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#131335"); g.addColorStop(1,"#2b1b52");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // parallax hills
    ctx.fillStyle="#1d1d46";
    for(let i=0;i<7;i++){ const hx=((i*520)-(cam*.4))%(WORLD)-100; ctx.beginPath(); ctx.arc(hx,H,180,Math.PI,0); ctx.fill(); }
    ctx.save(); ctx.translate(-cam,0);
    // tiles
    const cA=Math.floor(cam/T), cB=Math.min(COLS-1,Math.ceil((cam+W)/T));
    for(let r=0;r<ROWS.length;r++)for(let c=cA;c<=cB;c++){
      const ch=ROWS[r][c];
      if(ch==="#"){ ctx.fillStyle="#5b3a29"; ctx.fillRect(c*T,r*T,T,T);
        if(!solid(c,r-1)){ctx.fillStyle="#34d399";ctx.fillRect(c*T,r*T,T,9);}
        ctx.strokeStyle="#0006"; ctx.strokeRect(c*T+.5,r*T+.5,T-1,T-1); }
      if(ch==="="){ ctx.fillStyle="#f59e0b"; ctx.fillRect(c*T,r*T+6,T,T-14);
        ctx.strokeStyle="#0007"; ctx.strokeRect(c*T+.5,r*T+6.5,T-1,T-15); }
    }
    // coins
    coins.forEach(o=>{ if(o.got)return; const w=8+6*Math.abs(Math.sin(tick*.1+o.x));
      ctx.fillStyle="#fde047"; ctx.beginPath(); ctx.ellipse(o.x,o.y,w,13,0,0,7); ctx.fill();
      ctx.strokeStyle="#b45309"; ctx.stroke(); });
    // flag
    ctx.fillStyle="#e5e7eb"; ctx.fillRect(flag.x-3,flag.y-150,6,150);
    ctx.fillStyle="#22d3ee"; ctx.beginPath(); ctx.moveTo(flag.x+3,flag.y-150); ctx.lineTo(flag.x+52,flag.y-132); ctx.lineTo(flag.x+3,flag.y-114); ctx.fill();
    // enemies
    enemies.forEach(e=>{ if(e.dead)return;
      ctx.fillStyle="#a855f7"; ctx.beginPath(); ctx.arc(e.x,e.y,15,Math.PI,0); ctx.fill(); ctx.fillRect(e.x-15,e.y-1,30,12);
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(e.x-6,e.y-4,4.5,0,7); ctx.arc(e.x+6,e.y-4,4.5,0,7); ctx.fill();
      ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(e.x-6+e.dir*2,e.y-4,2,0,7); ctx.arc(e.x+6+e.dir*2,e.y-4,2,0,7); ctx.fill(); });
    // player
    ctx.fillStyle="#ef4444"; ctx.fillRect(p.x,p.y,p.w,14);
    ctx.fillStyle="#3b82f6"; ctx.fillRect(p.x,p.y+14,p.w,p.h-14);
    ctx.fillStyle="#fcd9b8"; ctx.fillRect(p.x+4,p.y+3,p.w-8,9);
    ctx.fillStyle="#000"; ctx.fillRect(p.x+(p.face>0?p.w-10:4),p.y+5,4,4);
    ctx.restore();
    if(st==="win")arcadeText(ctx,W,H,"🏁 LEVEL CLEAR!","Enter = play again · Esc = close");
    if(st==="over")arcadeText(ctx,W,H,"💀 GAME OVER","Enter = try again · Esc = close");
    hud.innerHTML=`<span>🍄 SUPER JUMPMAN</span><span>⭐ ${score}</span><span>❤️ ${lives}</span>`;
  }
  init();
  return arcadeLoop(step,draw,k);
}

/* --- Chomp Maze: pac-style maze game --- */
function gameChomp(cv,hud,keysEl){
  const MAPS=[
    "###################",
    "#........#........#",
    "#o##.###.#.###.##o#",
    "#.................#",
    "#.##.#.#####.#.##.#",
    "#....#...#...#....#",
    "####.###.#.###.####",
    "   #.#...G...#.#   ",
    "####.#.#####.#.####",
    "#........#........#",
    "#.##.###.#.###.##.#",
    "#o.#.....P.....#.o#",
    "##.#.#.#####.#.#.##",
    "#....#...#...#....#",
    "###################",
  ];
  const CO=19,RO=15,T=34,W=CO*T,H=RO*T; cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  keysEl.textContent="← ↑ ↓ → / WASD move · Enter restart · Esc close";
  const wall=(c,r)=>{ c=((c%CO)+CO)%CO; if(r<0||r>=RO)return true; return MAPS[r][c]==="#"; };
  const GCOLS=["#f43f5e","#22d3ee","#fbbf24"];
  let dots,pac,ghosts,score,lives,st,fright,tick,total;
  function ent(c,r){ return {x:c*T+T/2,y:r*T+T/2,dir:[0,0],want:[0,0]}; }
  let pacHome=[9,11],gHome=[9,7];
  function init(){
    dots={}; total=0;
    for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){ const ch=MAPS[r][c];
      if(ch==="."){dots[c+","+r]=1;total++;} if(ch==="o"){dots[c+","+r]=2;total++;}
      if(ch==="P")pacHome=[c,r]; if(ch==="G")gHome=[c,r]; }
    score=0; lives=3; st="play"; fright=0; tick=0;
    resetPos();
  }
  function resetPos(){
    pac=ent(...pacHome); pac.dir=[0,0]; pac.want=[0,0];
    ghosts=GCOLS.map((col,i)=>{ const g=ent(gHome[0]-1+i,gHome[1]); g.col=col; g.dir=[0,-1]; g.wait=140+i*200; return g; });
    fright=0;
  }
  const k=arcadeKeys();
  const atCenter=e=>Math.abs((e.x-T/2)%T)<2.6&&Math.abs((e.y-T/2)%T)<2.6;
  const tileOf=e=>[Math.round((e.x-T/2)/T),Math.round((e.y-T/2)/T)];
  function tryDir(e,d,sp){
    const [c,r]=tileOf(e);
    if(!wall(c+d[0],r+d[1])){e.dir=d;return true;} return false;
  }
  function move(e,sp){
    e.x+=e.dir[0]*sp; e.y+=e.dir[1]*sp;
    if(e.x<-T/2)e.x=W+T/2-1; if(e.x>W+T/2)e.x=-T/2+1;
    const [c,r]=tileOf(e);
    if(e.dir[0]&&wall(c+e.dir[0],r)&&atCenter(e)){e.x=c*T+T/2;e.dir=[0,0];}
    if(e.dir[1]&&wall(c,r+e.dir[1])&&atCenter(e)){e.y=r*T+T/2;e.dir=[0,0];}
    if(e.dir[0])e.y+= (r*T+T/2-e.y)*.3; if(e.dir[1])e.x+=(c*T+T/2-e.x)*.3;
  }
  function step(){
    tick++;
    if(st!=="play"){ if(k.enter||k.jump)init(); return; }
    if(fright>0)fright--;
    // pac input
    if(k.left)pac.want=[-1,0]; if(k.right)pac.want=[1,0]; if(k.up)pac.want=[0,-1]; if(k.down)pac.want=[0,1];
    if((pac.want[0]!==pac.dir[0]||pac.want[1]!==pac.dir[1])&&atCenter(pac)) tryDir(pac,pac.want);
    if(pac.want[0]===-pac.dir[0]&&pac.want[1]===-pac.dir[1]&&(pac.dir[0]||pac.dir[1])) pac.dir=pac.want.slice();
    move(pac,2.6);
    // eat
    const [pc,pr]=tileOf(pac), key=pc+","+pr;
    if(dots[key]){ score+=dots[key]===2?50:10; if(dots[key]===2)fright=420; delete dots[key]; total--; if(total<=0)st="win"; }
    // ghosts
    ghosts.forEach(g=>{
      if(g.wait>0){g.wait--;return;}
      if(atCenter(g)){
        const [c,r]=tileOf(g);
        const opts=[[1,0],[-1,0],[0,1],[0,-1]].filter(d=>!(d[0]===-g.dir[0]&&d[1]===-g.dir[1])&&!wall(c+d[0],r+d[1]));
        if(opts.length){
          let best;
          if(Math.random()<.38) best=opts[Math.floor(Math.random()*opts.length)];
          else{
            const dist=d=>{const dx=(c+d[0])-pc,dy=(r+d[1])-pr;return dx*dx+dy*dy;};
            opts.sort((a,b)=>dist(a)-dist(b));
            best=fright>0?opts[opts.length-1]:opts[0];
          }
          g.dir=best;
        }
      }
      move(g,fright>0?1.5:1.9);
      const dx=g.x-pac.x,dy=g.y-pac.y;
      if(dx*dx+dy*dy<380){
        if(fright>0){ score+=200; g.x=gHome[0]*T+T/2; g.y=gHome[1]*T+T/2; g.wait=120; g.dir=[0,-1]; }
        else{ lives--; if(lives<=0)st="over"; else resetPos(); }
      }
    });
  }
  function draw(){
    ctx.fillStyle="#050514"; ctx.fillRect(0,0,W,H);
    for(let r=0;r<RO;r++)for(let c=0;c<CO;c++){
      if(MAPS[r][c]==="#"){ ctx.fillStyle="#1e1b6b"; ctx.fillRect(c*T+2,r*T+2,T-4,T-4);
        ctx.strokeStyle="#4f46e5"; ctx.strokeRect(c*T+2.5,r*T+2.5,T-5,T-5); }
    }
    for(const key in dots){ const [c,r]=key.split(",").map(Number);
      ctx.fillStyle="#fde047"; ctx.beginPath();
      ctx.arc(c*T+T/2,r*T+T/2,dots[key]===2?(7+2*Math.sin(tick*.15)):3.5,0,7); ctx.fill(); }
    // pac
    const ang=Math.atan2(pac.dir[1],pac.dir[0])||0, mouth=.28+.22*Math.sin(tick*.25);
    ctx.fillStyle="#facc15"; ctx.beginPath();
    ctx.moveTo(pac.x,pac.y); ctx.arc(pac.x,pac.y,14,ang+mouth,ang-mouth); ctx.closePath(); ctx.fill();
    // ghosts
    ghosts.forEach(g=>{
      const col=fright>0?((fright<120&&Math.floor(tick/10)%2)?"#fff":"#3b82f6"):g.col;
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(g.x,g.y-2,13,Math.PI,0);
      ctx.lineTo(g.x+13,g.y+11);
      for(let i=2;i>=-2;i--) ctx.lineTo(g.x+i*6.5-3.25,g.y+11-((i+10)%2?5:0));
      ctx.closePath(); ctx.fill();
      ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(g.x-5,g.y-4,4,0,7); ctx.arc(g.x+5,g.y-4,4,0,7); ctx.fill();
      ctx.fillStyle="#1e1b4b"; ctx.beginPath(); ctx.arc(g.x-5+g.dir[0]*2,g.y-4+g.dir[1]*2,2,0,7); ctx.arc(g.x+5+g.dir[0]*2,g.y-4+g.dir[1]*2,2,0,7); ctx.fill();
    });
    if(st==="win")arcadeText(ctx,W,H,"🎉 MAZE CLEARED!","Enter = play again · Esc = close");
    if(st==="over")arcadeText(ctx,W,H,"👻 GAME OVER","Enter = try again · Esc = close");
    hud.innerHTML=`<span>👻 CHOMP MAZE</span><span>⭐ ${score}</span><span>❤️ ${lives}</span>`;
  }
  init();
  return arcadeLoop(step,draw,k);
}

/* --- Barrel Climb: DK-style girder climber --- */
function gameBarrel(cv,hud,keysEl){
  const W=960,H=600; cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  keysEl.textContent="← → move · ↑ ↓ climb ladders · Space jump · Enter restart · Esc close";
  // girders bottom(0)→top(5); barrels roll downhill
  const G=[...Array(6)].map((_,i)=>{ const d=(i%2)?1:-1, s=.018*d; return {cy:555-90*i, s, d}; });
  const gy=(i,x)=>G[i].cy+G[i].s*(x-480);
  const LAD=[ // {lo: lower girder idx, x}
    {lo:0,x:180},{lo:0,x:820},{lo:1,x:90},{lo:1,x:620},{lo:2,x:320},{lo:2,x:880},
    {lo:3,x:150},{lo:3,x:700},{lo:4,x:430},{lo:4,x:870},
  ];
  const TOP={x1:40,x2:230,y:52}, TL={x:120}; // princess platform + its ladder from girder 5
  const KONG={x:300}, SPAWN=220;
  let p,bars,score,lives,st,tick;
  function init(){ bars=[]; score=0; lives=3; st="play"; tick=0; respawn(); }
  function respawn(){ p={x:70,g:0,y:0,vy:0,jump:false,climb:null,onTop:false,face:1,inv:110}; p.y=gy(0,p.x)-17; }
  const k=arcadeKeys();
  function hurt(){ lives--; if(lives<=0)st="over"; else respawn(); }
  function step(){
    tick++;
    if(st!=="play"){ if(k.enter||k.jump)init(); return; }
    if(p.inv>0)p.inv--;
    // spawn barrels
    if(tick%SPAWN===1&&bars.length<6) bars.push({x:KONG.x+40,g:5,y:gy(5,KONG.x+40)-11,climb:null,scored:false,rot:0});
    // player
    if(p.climb!==null){
      const L=p.climb;
      const topY=L.top? TOP.y : gy(L.lo+1,L.x), botY=L.top? gy(5,L.x) : gy(L.lo,L.x);
      if(k.up)p.y-=2.4; if(k.down)p.y+=2.4;
      p.x=L.x;
      if(p.y-17<=topY-17){ p.y=topY-17; if(L.top){p.onTop=true;p.climb=null;st="win";score+=1000;} else {p.g=L.lo+1;p.climb=null;} }
      if(p.y>=botY-17){ p.y=botY-17; p.g=L.lo; p.climb=null; }
    } else if(!p.onTop){
      if(k.left){p.x-=3;p.face=-1} if(k.right){p.x+=3;p.face=1}
      p.x=Math.max(14,Math.min(W-14,p.x));
      if(p.jump){ p.vy+=.55; p.y+=p.vy; if(p.y>=gy(p.g,p.x)-17){p.y=gy(p.g,p.x)-17;p.jump=false;p.vy=0;} }
      else{
        p.y=gy(p.g,p.x)-17;
        if(k.jump){p.jump=true;p.vy=-9;}
        // grab ladder
        if(k.up||k.down){
          for(const L of LAD){
            if(Math.abs(p.x-L.x)<16){
              if(k.up&&L.lo+1<=5&&p.g===L.lo){p.climb=L;break;}
              if(k.down&&p.g===L.lo+1){p.climb=L;break;}
            }
          }
          if(!p.climb&&p.g===5&&k.up&&Math.abs(p.x-TL.x)<16){p.climb={lo:4,x:TL.x,top:true};}
        }
      }
    }
    // barrels
    bars.forEach(b=>{
      b.rot+=.2;
      if(b.climb!==null){
        const L=b.climb; b.y+=2.6; b.x=L.x;
        if(b.y>=gy(L.lo,L.x)-11){ b.y=gy(L.lo,L.x)-11; b.g=L.lo; b.climb=null; }
      } else {
        b.x+=G[b.g].d*2.7;
        if(b.x<-25||b.x>W+25){
          if(b.g===0){ b.dead=true; score+=25; }
          else{ b.g--; b.x=Math.max(-20,Math.min(W+20,b.x)); }
        }
        b.y=gy(b.g,Math.max(0,Math.min(W,b.x)))-11;
        // maybe take a ladder down
        for(const L of LAD){
          if(L.lo+1===b.g&&Math.abs(b.x-L.x)<4&&Math.random()<.12){ b.climb=L; break; }
        }
      }
      // jump-over bonus
      if(!b.scored&&p.jump&&b.g===p.g&&Math.abs(b.x-p.x)<28&&b.y-p.y>20){ b.scored=true; score+=100; }
      // hit player
      const dx=b.x-p.x, dy=b.y-(p.y+2);
      if(dx*dx+dy*dy<540&&st==="play"&&p.inv<=0) hurt();
    });
    bars=bars.filter(b=>!b.dead);
  }
  function drawLadder(x,y1,y2){
    ctx.strokeStyle="#22d3ee"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x-9,y1); ctx.lineTo(x-9,y2); ctx.moveTo(x+9,y1); ctx.lineTo(x+9,y2); ctx.stroke();
    for(let y=y1+6;y<y2;y+=12){ ctx.beginPath(); ctx.moveTo(x-9,y); ctx.lineTo(x+9,y); ctx.stroke(); }
    ctx.lineWidth=1;
  }
  function draw(){
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,"#0b0b22"); g.addColorStop(1,"#26103e");
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // ladders behind girders
    LAD.forEach(L=>drawLadder(L.x,gy(L.lo+1,L.x),gy(L.lo,L.x)));
    drawLadder(TL.x,TOP.y,gy(5,TL.x));
    // girders
    G.forEach((gr,i)=>{ ctx.strokeStyle="#f43f5e"; ctx.lineWidth=8; ctx.beginPath();
      ctx.moveTo(0,gy(i,0)); ctx.lineTo(W,gy(i,W)); ctx.stroke();
      ctx.strokeStyle="#be123c"; ctx.lineWidth=2;
      for(let x=10;x<W;x+=34){ ctx.beginPath(); ctx.moveTo(x,gy(i,x)-4); ctx.lineTo(x+14,gy(i,x+14)+4); ctx.stroke(); }
    });
    ctx.lineWidth=1;
    // princess platform
    ctx.strokeStyle="#f472b6"; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(TOP.x1,TOP.y); ctx.lineTo(TOP.x2,TOP.y); ctx.stroke(); ctx.lineWidth=1;
    // princess
    ctx.fillStyle="#f9a8d4"; ctx.fillRect(126,TOP.y-34,18,24);
    ctx.fillStyle="#fcd9b8"; ctx.beginPath(); ctx.arc(135,TOP.y-40,9,0,7); ctx.fill();
    ctx.fillStyle="#fff"; ctx.font="700 13px Segoe UI"; ctx.fillText("HELP!",160,TOP.y-42);
    // kong
    const kx=KONG.x, ky=gy(5,kx);
    ctx.fillStyle="#7c4a21"; ctx.beginPath(); ctx.arc(kx,ky-32,26,0,7); ctx.fill();
    ctx.fillStyle="#5b3a29"; ctx.beginPath(); ctx.arc(kx-24,ky-18,11,0,7); ctx.arc(kx+24,ky-18,11,0,7); ctx.fill();
    ctx.fillStyle="#e7c9a9"; ctx.beginPath(); ctx.arc(kx,ky-26,13,0,7); ctx.fill();
    ctx.fillStyle="#000"; ctx.beginPath(); ctx.arc(kx-5,ky-32,2.6,0,7); ctx.arc(kx+5,ky-32,2.6,0,7); ctx.fill();
    // barrels
    bars.forEach(b=>{ ctx.fillStyle="#f59e0b"; ctx.beginPath(); ctx.arc(b.x,b.y,11,0,7); ctx.fill();
      ctx.strokeStyle="#92400e"; ctx.beginPath(); ctx.arc(b.x,b.y,11,0,7); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x-11*Math.cos(b.rot),b.y-11*Math.sin(b.rot)); ctx.lineTo(b.x+11*Math.cos(b.rot),b.y+11*Math.sin(b.rot)); ctx.stroke(); });
    // player (blinks while invulnerable)
    if(!(p.inv>0&&Math.floor(tick/5)%2)){
      ctx.fillStyle="#3b82f6"; ctx.fillRect(p.x-9,p.y-4,18,21);
      ctx.fillStyle="#ef4444"; ctx.fillRect(p.x-9,p.y-12,18,8);
      ctx.fillStyle="#fcd9b8"; ctx.beginPath(); ctx.arc(p.x,p.y-16,8,0,7); ctx.fill();
      ctx.fillStyle="#000"; ctx.fillRect(p.x+(p.face>0?2:-5),p.y-18,3,3);
    }
    if(st==="win")arcadeText(ctx,W,H,"💖 RESCUED!","Enter = play again · Esc = close");
    if(st==="over")arcadeText(ctx,W,H,"🛢️ GAME OVER","Enter = try again · Esc = close");
    hud.innerHTML=`<span>🦍 BARREL CLIMB</span><span>⭐ ${score}</span><span>❤️ ${lives}</span>`;
  }
  init();
  return arcadeLoop(step,draw,k);
}

        ${TREES.map((t,i)=>`<div class="tcard" style="--tc:${t.col}" onclick="treeGo('t${i}')">
          <img src="${t.img}" alt="" onerror="this.style.display='none'">
          <div class="tinfo"><b>${t.emoji} ${esc(t.name)}</b><span>${esc(t.my)} · <i>${esc(t.latin)}</i></span></div>
        </div>`).join("")}
        <div class="tcard" style="--tc:#fbbf24" onclick="TQ={i:0,score:0,picked:null};treeGo('quiz')">
          <div style="aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:56px;background:linear-gradient(135deg,#7c3aed44,#fbbf2433)">❓</div>
          <div class="tinfo"><b>🎯 Which Tree Am I?</b><span>4-question mini quiz — tap to play!</span></div>
        </div>
      </div>`;
  } else if(view==="quiz"){
    if(TQ.i>=TREE_QUIZ.length){
      ov.innerHTML=head("🎯 Quiz complete!","")+`
        <div class="card" style="text-align:center;padding:40px 20px">
          <div style="font-size:60px">${TQ.score===4?"🏆":TQ.score>=2?"🌟":"🌱"}</div>
          <h1 style="margin:10px 0">You got ${TQ.score} / ${TREE_QUIZ.length}!</h1>
          <div class="row" style="justify-content:center;margin-top:14px">
            <button class="btn primary lg" onclick="TQ={i:0,score:0,picked:null};treeGo('quiz')">🔁 Play again</button>
            <button class="btn ghost lg" onclick="treeGo('home')">← All trees</button>
          </div>
        </div>`;
      return;
    }
    const q=TREE_QUIZ[TQ.i];
    ov.innerHTML=head("🎯 Which Tree Am I?",`Question ${TQ.i+1} of ${TREE_QUIZ.length} · Score ${TQ.score}`)+`
      <div class="card" style="max-width:760px;margin:0 auto;padding:22px">
        <div class="twow" style="margin:0 0 18px">“${q.q}”</div>
        ${TREES.map((t,i)=>{
          let cls="";
          if(TQ.picked!==null){ if(i===q.a)cls="correct"; else if(i===TQ.picked)cls="wrong"; }
          return `<button class="qopt ${cls}" onclick="treeAnswer(${i})">${t.emoji} ${esc(t.name)} <span class="muted">(${esc(t.my)})</span></button>`;
        }).join("")}
        ${TQ.picked!==null?`<div class="row" style="justify-content:center;margin-top:8px">
          <button class="btn primary lg" onclick="TQ.i++;TQ.picked=null;treeGo('quiz')">${TQ.i+1<TREE_QUIZ.length?"Next question →":"See my score 🏁"}</button>
        </div>`:""}
      </div>`;
  } else {
    const i=+view.slice(1), t=TREES[i]; if(!t)return treeGo("home");
    ov.innerHTML=head(`${t.emoji} ${esc(t.name)}`,`${esc(t.my)} · <i>${esc(t.latin)}</i>`)+`
      <img src="${t.img}" alt="" class="tdetail-img" style="width:100%;max-height:44vh;object-fit:cover;border-radius:18px;background:#141432" onerror="this.style.display='none'">
      <div class="tstats">
        <div class="tstat">📏 ${esc(t.height)}</div>
        <div class="tstat">🎂 ${esc(t.age)}</div>
        <div class="tstat">🌍 ${esc(t.home)}</div>
      </div>
      <p class="section-label">Fun facts</p>
      <ul class="tfacts">${t.facts.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>
      <div class="twow">💡 ${esc(t.wow)}</div>
      <div class="row" style="margin-top:18px">
        <button class="btn ghost" onclick="treeGo('t${(i+3)%4}')">← ${TREES[(i+3)%4].emoji} ${esc(TREES[(i+3)%4].name)}</button>
        <button class="btn ghost" onclick="treeGo('t${(i+1)%4}')">${TREES[(i+1)%4].emoji} ${esc(TREES[(i+1)%4].name)} →</button>
      </div>`;
  }
  ov.scrollTop=0;
}
function treeAnswer(i){
  if(TQ.picked!==null)return;
  TQ.picked=i;
  if(i===TREE_QUIZ[TQ.i].a)TQ.score++;
  treeGo("quiz");
}

/* ---------- Game 08: Speed Edit Showdown challenge gallery ---------- */
const SHOWDOWN=[
  {img:"edit1.jpg", style:"3D cartoon",       prompt:"Cute 3D cartoon render of a cat astronaut floating in outer space holding a glass of frothy milk tea (teh tarik), stars and planets behind, vibrant colors"},
  {img:"edit2.jpg", style:"Photorealistic",   prompt:"Photorealistic photo of a giant hot air balloon shaped like a spiky durian fruit floating over a tropical beach at sunset, golden light"},
  {img:"edit3.jpg", style:"Pixel art",        prompt:"Retro pixel art of a penguin selling ice cream from a rainbow-colored van in a sunny desert with cactus, 16-bit video game style"},
  {img:"edit4.jpg", style:"Watercolor",       prompt:"Soft watercolor painting of a traditional Malaysian kampung stilt house underwater with colorful fish swimming through its open windows, dreamy pastel tones"},
  {img:"edit5.jpg", style:"Claymation",       prompt:"Claymation stop-motion style scene of a friendly tiger riding a bicycle with a basket of satay skewers on the back, city street background, handmade plasticine look"},
  {img:"edit6.jpg", style:"Comic book",       prompt:"Bold comic book illustration of a shiny robot playing badminton against a determined chicken on an outdoor court, action lines, halftone dots, dynamic poses"},
  {img:"edit7.jpg", style:"Paper cutout",     prompt:"Layered paper cutout craft art of a castle made of watermelon slices standing on a green hill with paper clouds and sun, colorful construction paper texture"},
  {img:"edit8.jpg", style:"Neon glow",        prompt:"Glowing neon outline art of a friendly dragon curled around a lighthouse at night, electric blue and pink neon lines on dark background"},
  {img:"edit9.jpg", style:"Crayon drawing",   prompt:"Child's crayon drawing of a happy elephant painting a rainbow across the sky with its trunk, wobbly lines, bright waxy crayon strokes on white paper"},
  {img:"edit10.jpg",style:"Origami",          prompt:"Origami paper folding art of a rocket ship launching from a green rice paddy field, folded paper clouds of smoke, crisp geometric paper textures"},
];
function mountShowdown(){
  const m=document.getElementById("moduleMount"); if(!m)return;
  m.innerHTML=`
    <p class="section-label">🖼️ Challenge Gallery <span class="muted" style="text-transform:none;letter-spacing:0">— tap a card to show it BIG on the projector</span></p>
    <div class="tgrid">
      ${SHOWDOWN.map((c,i)=>`<div class="tcard" style="--tc:#f59e0b" onclick="openShowdown(${i})">
        <img src="${c.img}" alt="" onerror="this.style.display='none'">
        <div class="tinfo"><b>👁️ Challenge ${i+1}</b><span>Can your team copy this with a prompt?</span></div>
      </div>`).join("")}
    </div>`;
}
let SD_I=0;
function openShowdown(i){ closeShowdown(); const ov=document.createElement("div"); ov.className="treeapp"; ov.id="sdOv"; document.body.appendChild(ov); sdGo(i); }
function closeShowdown(){ const ov=document.getElementById("sdOv"); if(ov)ov.remove(); }
window.addEventListener("keydown",e=>{ if(e.key==="Escape") closeShowdown(); });
window.addEventListener("hashchange", closeShowdown);
function sdGo(i){
  const ov=document.getElementById("sdOv"); if(!ov)return;
  SD_I=(i+SHOWDOWN.length)%SHOWDOWN.length;
  const c=SHOWDOWN[SD_I];
  ov.innerHTML=`
    <div class="thead">
      <div style="flex:1"><h1>👁️ Challenge ${SD_I+1} <span style="color:var(--muted);font-size:.6em">of ${SHOWDOWN.length}</span></h1>
      <div class="tsub">Study it… then recreate it with ONE prompt!</div></div>
      <button class="btn ghost" onclick="sdGo(${SD_I-1})">← Prev</button>
      <button class="btn ghost" onclick="sdGo(${SD_I+1})">Next →</button>
      <button class="btn ghost" onclick="closeShowdown()">✕ Close</button>
    </div>
    <img src="${c.img}" alt="" style="width:100%;max-height:76vh;object-fit:contain;border-radius:18px;background:#000">`;
  ov.scrollTop=0;
}

/* ---------- Flag Retrieval board ---------- */
const FLAG_COLORS=[
  {name:"Crimson",c:"#e11d48"},{name:"Ocean",c:"#0284c7"},{name:"Amber",c:"#f59e0b"},
  {name:"Emerald",c:"#10b981"},{name:"Violet",c:"#8b5cf6"},{name:"Rose",c:"#ec4899"},
  {name:"Cyan",c:"#06b6d4"},{name:"Tangerine",c:"#f97316"},{name:"Teal",c:"#14b8a6"},{name:"Lime",c:"#84cc16"}];

function newFlagBoard(){
  const ids=GAMES.map(g=>g.id);
  for(let i=ids.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [ids[i],ids[j]]=[ids[j],ids[i]]; }
  return {order:ids, revealed:{}};
}
function ensureFlags(){ if(!state.flags||!Array.isArray(state.flags.order)){ state.flags=newFlagBoard(); save(); } }

function viewFlags(){
  ensureFlags();
  // Cards are never persisted as revealed — every group gets a fresh face-down
  // board. A card flips open for the QR, then flips back when the modal closes.
  const cards=state.flags.order.map((id,i)=>{
    const g=GAMES.find(x=>x.id===id), col=FLAG_COLORS[i%FLAG_COLORS.length];
    return `<div class="flagcard" style="--fc:${col.c}" onclick="flagClick(${id})">
      <div class="flagcard-inner">
        <div class="flagface front"><div class="q">?</div><div class="cn">${col.name}</div></div>
        <div class="flagface back">
          <div class="em">${g.emoji}</div>
          <span class="pill">ACT ${g.act}</span>
          <div class="nm">${esc(g.name)}</div>
          <div class="qrhint">📱 tap for QR brief</div>
        </div>
      </div>
    </div>`;
  }).join("");
  return `<div class="row" style="justify-content:space-between">
    <div><div class="h1">🚩 Flag Retrieval</div>
    <p class="sub">Each colour hides one activity. Pick a card → scan the QR → close, and the card flips back for the next group.</p></div>
  </div>
  <div class="flag-grid">${cards}</div>
  <div class="row" style="margin-top:18px">
    <button class="btn ghost" onclick="resetFlags()">↺ Reshuffle colours</button>
  </div>
  <div id="flagModal"></div>`;
}
function flagClick(id){
  ensureFlags();
  const card=document.querySelectorAll(".flagcard")[state.flags.order.indexOf(id)];
  if(card && !card.classList.contains("revealed")){
    card.classList.add("revealed");
    setTimeout(()=>openFlagModal(id), 700);
  } else openFlagModal(id);
}
function openFlagModal(id){
  const g=GAMES.find(x=>x.id===id);
  const i=state.flags.order.indexOf(id), col=FLAG_COLORS[i%FLAG_COLORS.length];
  let qrsvg="";
  try{
    const qr=qrcode(0,"M"); qr.addData(qrPayload(g),"Byte"); qr.make();
    qrsvg=qr.createSvgTag({cellSize:4,margin:0,scalable:true});
  }catch(e){ qrsvg="<div style='color:#000;font-size:13px;padding:16px'>QR could not be generated</div>"; }
  const hosted=(location.protocol==="http:"||location.protocol==="https:");
  const qrCaption=hosted?"📱 Scan to open the mission":"📱 Scan for the mission brief";
  const el=document.getElementById("flagModal"); if(!el) return;
  el.innerHTML=`<div class="modal-ov" onclick="if(event.target===this)closeFlagModal()">
    <div class="modal">
      <div style="flex:1;min-width:230px">
        <span class="pill" style="border-color:${col.c};color:${col.c}">🚩 ${col.name} card</span>
        <div style="font-size:46px;margin:10px 0 2px">${g.emoji}</div>
        <span class="pill">ACT ${g.act}</span>
        <h2 style="margin:8px 0 8px;font-size:25px">${esc(g.name)}</h2>
        <span class="otag" style="background:${g.outCol}">▶ ${esc(g.outType)}</span>
        <p class="muted" style="font-size:13px;margin-top:12px;line-height:1.5">${esc(g.learning)}</p>
        <p class="section-label" style="margin-top:18px">🖥️ For the big screen</p>
        <div class="row">
          <button class="btn primary" onclick="go('#/game/${g.id}')">Open projector view →</button>
          <button class="btn ghost" onclick="closeFlagModal()">Close</button>
        </div>
      </div>
      <div style="text-align:center">
        <p class="section-label">📱 For participants</p>
        <div class="qrbox">${qrsvg}</div>
        <p class="fs-hint" style="margin-top:9px">${qrCaption}</p>
      </div>
    </div>
  </div>`;
}
function closeFlagModal(){
  const el=document.getElementById("flagModal"); if(el) el.innerHTML="";
  // Flip every open card back face-down — the board resets for the next group.
  document.querySelectorAll(".flagcard.revealed").forEach(c=>c.classList.remove("revealed"));
}
function resetFlags(){
  if(!confirm("Reshuffle which colour hides which activity?")) return;
  state.flags=newFlagBoard(); save(); render(); toast("Board reshuffled");
}
/* Participant mission page — what a scanned QR opens once the app is hosted (e.g. Vercel) */
function viewMission(g){
  if(!g) return `<div class="empty">Mission not found. <a href="#/">Home</a></div>`;
  return `<div class="mission" style="max-width:560px;margin:0 auto">
    <div class="hero slim">
      <img src="hero${g.id}.jpg" alt="" onerror="this.src='hero.png'">
      <div class="ovs">
        <div class="ghead">
          <div class="em">${g.emoji}</div>
          <div style="flex:1;min-width:200px">
            <span class="pill">ACT ${g.act} · MISSION BRIEF</span>
            <h1 style="font-size:26px;margin:8px 0 6px">${esc(g.name)}</h1>
            <span class="otag" style="background:${g.outCol}">▶ OUTPUT · ${esc(g.outType)}</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card pad">
      <p class="section-label">Your mission</p>
      <p style="font-size:15px;line-height:1.55;margin:0 0 16px">${esc(g.desc)}</p>
      <p class="section-label">Steps</p>
      <ol class="steps">${g.steps.map(s=>`<li>${esc(s)}</li>`).join("")}</ol>
      <hr/>
      <p class="section-label">Suggested AI apps</p>
      <div class="row">${g.apps.map(a=>`<span class="tag">${esc(a)}</span>`).join("")}</div>
    </div>
    ${g.id===3?`
    <div class="card pad" style="margin-top:14px">
      <p class="section-label">📱 Team check-in</p>
      <p class="sub" style="margin:0 0 10px">Tap your team — this starts your mission clock!</p>
      <div class="teamchips">
        ${state.teams.map(t=>{ const s=(state.scan3||{})[t.id];
          return `<button class="teamchip ${s&&s.scan?'active':''}" style="--tc:${t.color}" onclick="missionCheckin('${t.id}')">${s&&s.scan?'🚀 ':''}${esc(t.name)}</button>`; }).join("")}
      </div>
    </div>`:""}
    <p class="fs-hint" style="text-align:center;margin-top:14px">Good luck, team! 🚀</p>
  </div>`;
}
function missionCheckin(id){
  state.scan3=state.scan3||{};
  const s=state.scan3[id]=state.scan3[id]||{};
  if(!s.scan){ s.scan=Date.now(); save(); }
  render();
  const t=state.teams.find(x=>x.id===id);
  toast((t?t.name:"Team")+" checked in — GO! 🚀");
}
function qrPayload(g){
  // Hosted (http/https, e.g. Vercel game hub): deep-link to the mobile mission page.
  // Offline (file://): embed the brief itself as text.
  if(location.protocol==="http:"||location.protocol==="https:")
    return location.origin+location.pathname+"#/m/"+g.id;
  return missionText(g);
}
function missionText(g){
  return (`ACT ${g.act}: ${g.name.toUpperCase()}\nOUTPUT: ${g.outType}\n\nSTEPS:\n${g.steps.map((s,i)=>(i+1)+". "+s).join("\n")}\n\nAPPS: ${g.apps.join(", ")}`)
    .replace(/[—–]/g,"-").replace(/→/g,"->").replace(/[“”]/g,'"').replace(/[‘’]/g,"'");
}

/* ---------- utilities ---------- */
function copy(txt){
  navigator.clipboard?.writeText(txt).then(()=>toast("Copied ✓"),()=>fallbackCopy(txt)) || fallbackCopy(txt);
}
function fallbackCopy(txt){ const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");toast("Copied ✓");}catch(e){toast("Copy failed");} ta.remove(); }
let toastT=null;
function toast(msg){ const el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1600); }
function bindCommon(){}
</script>
